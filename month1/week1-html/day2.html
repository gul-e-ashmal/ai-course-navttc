<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form and table -- day2</title>
</head>

<body>

    <h2>Registration Form</h2>
    <form action="" method="post">
        <label for="fuullname">Full name</label>
        <input type="text" name="" id="" placeholder="Full Name">
        <br><br>

        <label for="age">Age limit from 18 to 45</label>
        <input type="number" name="" id="" placeholder="Age" min="18" max="45">
        <br><br>

        <label for="gender">Gender</label>
        <select name="" id="">
            <option value="">--select--</option>
            <option value="male">Male</option>
            <option value="Female">Femle</option>
        </select>
        <br><br>

        <label for="degree">Degree</label>
        <input type="radio" name="degree" id="Pursuing">Pursuing
        <input type="radio" name="degree" id="Completed">Completed
        <br><br>

        <label for="language">Programming Languages</label>
        <input type="checkbox" name="language" id="Java">Java
        <input type="checkbox" name="language" id="Python">Python
        <input type="checkbox" name="language" id="C++">C++
        <br><br>

        <fieldset>
            <legend>Upload Documents</legend>
            <label for="cnic">Upload Cnic</label>
            <input type="file" name="" id="" placeholder="Full Name">
            <br><br>
        </fieldset>

        <br><br>

        <input type="submit" value="submit">
        <input type="reset" value="Reset">
    </form>

</body>

</html>
